# MyTradingBot-SO — Nifty 50 Stock Options Configuration
# Strategy: 5-strategy swing options buyer framework on Dhan API
# Target: High-POP, high-RR swing trades (20-35 DTE, ATM or 1-ITM)

execution:
  mode: PAPER                   # BACKTEST | PAPER | LIVE
  slippage_buffer_pct: 0.5

risk:
  capital: 500000               # Total trading capital (₹5 lakh)
  max_risk_per_trade_pct: 3.0   # Max % of capital per trade (premium at risk)
  max_concurrent_positions: 5   # Up to 5 open positions across stocks
  sl_pct: 0.40                  # Stop loss: 40% of premium paid
  target_pct: 1.50              # Target: 150% of premium (2.5x)
  vix_max: 18.0                 # Hard VIX ceiling (India VIX)
  vix_min: 10.0                 # Soft floor
  min_dte: 20                   # Minimum DTE for new entries
  max_dte: 35                   # Maximum DTE for new entries
  confluence_min: 3             # Minimum confluence factors (of 5) required

monitoring:
  refresh_interval_seconds: 3600   # Check hourly (swing trades)
  market_open_time: "09:15"
  market_close_time: "15:30"
  entry_window_start: "09:45"      # Wait for market to settle
  entry_window_end: "14:00"

strategies:
  priority:
    - "Post-Earnings Move"
    - "Pre-Earnings Drift"
    - "FII Sector Momentum"
    - "Bear Momentum Put"
    - "52-Week High"
    - "Breakout Retest"
    - "Fibonacci Pullback"

  post_earnings_move:
    enabled: true
    move_threshold_pct: 3.0     # Minimum single-day move % to qualify (earnings reaction)
    lookback_days: 5            # Look for the event within last 5 sessions
    reversal_tolerance_pct: 3.0 # Ignore signal if spot has reversed more than this % from event close

  pre_earnings_drift:
    enabled: true
    days_before_earnings: 10     # Enter this many days before earnings
    days_before_exit: 1          # Exit this many days before earnings
    rsi_min: 50                  # Minimum RSI at entry
    ema_above: true              # Require stock above 20-day EMA

  fii_sector_momentum:
    enabled: true
    consecutive_buying_days: 3   # Min days of FII net buying in sector
    pullback_max_days: 2         # Enter on 1-2 day pullback

  fiftytwo_week_high:
    enabled: true
    volume_multiplier: 2.0       # Volume must be 2x 20-day average
    consolidation_days: 2        # Wait for consolidation above the high

  breakout_retest:
    enabled: true
    consolidation_lookback: 20   # Days for consolidation detection
    volume_multiplier: 1.5       # Breakout volume must be 1.5x avg
    retest_max_days: 10          # Maximum days to wait for retest
    rsi_min: 45

  bear_momentum_put:
    enabled: true
    min_negative_days: 3        # Min consecutive negative closes in last 5 sessions
    bounce_min_pct: 0.3         # Enter on bounce of at least 0.3% from recent low
    bounce_max_pct: 3.0         # Bounce must be less than 3% (not a full reversal)
    rsi_min: 35                 # RSI floor (not already deeply oversold)
    rsi_max: 60                 # RSI ceiling (not yet overbought)

  fibonacci_pullback:
    enabled: true
    swing_lookback: 60           # Days to find swing highs/lows
    fib_levels: [0.50, 0.618]    # Entry Fib levels
    rsi_min: 40
    rsi_max: 55
    sl_fib: 0.786                # Stop loss at 78.6% Fib

